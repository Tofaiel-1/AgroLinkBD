name: agrolinkbd
description: Agricultural marketplace and services platform for Bangladesh
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Material Design
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # Firebase
  firebase_core: ^3.1.0
  firebase_auth: ^5.1.0
  firebase_database: ^11.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_analytics: ^11.0.0
  firebase_crashlytics: ^4.0.0
  
  # API & Network
  http: ^1.1.2
  dio: ^5.4.0
  
  # Location & Maps
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.0
  location: ^5.0.3
  
  # Image & Camera
  image_picker: ^1.0.5
  camera: ^0.10.5+7
  image: ^4.1.3
  flutter_image_compress: ^2.1.0
  
  # Voice & Speech
  # speech_to_text: ^6.5.1  # Temporarily disabled due to Android build issues
  # flutter_tts: ^3.8.5     # Temporarily disabled due to Android build issues
  
  # Push Notifications
  flutter_local_notifications: ^17.0.0
  
  # Payment Gateway
  flutterwave_standard: ^1.0.7
  url_launcher: ^6.2.2
  
  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # Date & Time
  intl: ^0.18.1
  timeago: ^3.6.0
  
  # Utilities
  uuid: ^4.3.3
  path_provider: ^2.1.1
  permission_handler: ^11.1.0
  connectivity_plus: ^5.0.2
  
  # Charts & Analytics
  fl_chart: ^0.65.0
  
  # PDF & Documents
  pdf: ^3.10.7
  printing: ^5.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/data/
